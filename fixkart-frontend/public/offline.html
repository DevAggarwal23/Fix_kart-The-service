<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - FixKart</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #EBF4FF 0%, #F5F3FF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    h1 {
      font-size: 28px;
      color: #1F2937;
      margin-bottom: 12px;
    }
    
    p {
      color: #6B7280;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .tips {
      margin-top: 40px;
      padding: 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    
    .tips h3 {
      font-size: 16px;
      color: #1F2937;
      margin-bottom: 12px;
    }
    
    .tips ul {
      text-align: left;
      padding-left: 20px;
    }
    
    .tips li {
      color: #6B7280;
      font-size: 14px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry, we'll reconnect as soon as you're back online!</p>
    
    <button class="btn" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="tips">
      <h3>While you wait:</h3>
      <ul>
        <li>Check your Wi-Fi or mobile data connection</li>
        <li>Try moving closer to your router</li>
        <li>Toggle airplane mode on and off</li>
        <li>Restart your device</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Auto-reload when back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
